<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draw SVG</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="toolbar">
  <div class="group">
    <label for="width">Width (px)</label>
    <input type="number" id="width" min="50" max="4000" value="800">
    <label for="height">Height (px)</label>
    <input type="number" id="height" min="50" max="4000" value="600">
    <button id="resize">Set canvas</button>
  </div>
  <div class="group">
    <label for="color">Color</label>
    <input type="color" id="color" value="#111111">
    <label for="stroke">Stroke</label>
    <input type="range" id="stroke" min="1" max="40" value="4">
    <span id="strokeValue">4px</span>
  </div>
  <div class="group">
    <button id="zoomOut" aria-label="Zoom out">&minus;</button>
    <span id="zoomValue">100%</span>
    <button id="zoomIn" aria-label="Zoom in">+</button>
    <button id="zoomFit">Fit</button>
    <label class="checkbox"><input type="checkbox" id="gridToggle"> Show pixel grid</label>
  </div>
  <div class="group">
    <button id="clear">Clear</button>
    <button id="export">Export SVG</button>
  </div>
</div>

<div id="canvasWrap">
  <svg id="canvas" xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
    <defs>
      <pattern id="pixelGrid" width="1" height="1" patternUnits="userSpaceOnUse">
        <path d="M 1 0 L 0 0 0 1" fill="none" stroke="#3a3a3a" stroke-opacity="0.22" stroke-width="0.07"></path>
      </pattern>
    </defs>
    <rect id="gridOverlay" x="0" y="0" width="100%" height="100%" fill="url(#pixelGrid)" pointer-events="none" style="display: none;"></rect>
  </svg>
</div>

<script src="script.js"></script>
</body>
</html>
